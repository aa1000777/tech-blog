<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidScreenMirror - 项目文档</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-card-hover: #222230;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #ff6b35;
            --accent-hover: #ff8555;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(100, 100, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .mobile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.25rem;
        }

        .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .back-btn:hover { background: var(--bg-card); }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-spacer { width: 40px; }

        .content {
            position: relative;
            z-index: 1;
            padding: 80px 1rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.875rem;
        }

        .doc-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .doc-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 107, 53, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        }

        .doc-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
            color: var(--text-primary);
        }

        .doc-card .doc-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .doc-card .doc-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .doc-card .doc-size {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.show { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 880px;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal.show .modal-content { transform: scale(1); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            gap: 1rem;
        }

        .modal-title-wrap { flex: 1; min-width: 0; }

        .modal-title-wrap h2 {
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-all;
        }

        .modal-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            display: block;
        }

        .modal-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover { background: var(--bg-card-hover); }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .modal-close:hover { background: var(--bg-card); color: var(--text-primary); }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            line-height: 1.65;
        }

        .modal-body pre {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .modal-body code {
            background: var(--bg-card);
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .modal-body h1, .modal-body h2, .modal-body h3 { margin: 1.25rem 0 0.625rem; }
        .modal-body h1 { font-size: 1.5rem; }
        .modal-body h2 { font-size: 1.25rem; color: var(--accent); }
        .modal-body h3 { font-size: 1.1rem; }
        .modal-body p { margin: 0.625rem 0; }
        .modal-body ul, .modal-body ol { padding-left: 1.5rem; margin: 0.625rem 0; }
        .modal-body li { margin: 0.375rem 0; }
        .modal-body table { width: 100%; border-collapse: collapse; margin: 0.875rem 0; }
        .modal-body th, .modal-body td { border: 1px solid var(--border); padding: 0.625rem; text-align: left; }
        .modal-body th { background: var(--bg-card); font-weight: 600; }
        .modal-body blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 0.875rem 0; color: var(--text-secondary); }

        .modal-body img { max-width: 100%; border-radius: 8px; }
        .modal-body a { color: var(--accent); text-decoration: none; }
        .modal-body a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .doc-grid { grid-template-columns: 1fr; }
            .modal-content { max-height: 92vh; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <header class="mobile-header">
        <a href="../../" class="back-btn">←</a>
        <div class="logo">📱 AndroidScreenMirror</div>
        <div class="header-spacer"></div>
    </header>

    <main class="content">
        <div class="doc-grid" id="docList"></div>
    </main>

    <div class="modal" id="docModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <h2 id="modalTitle">文档标题</h2>
                    <span class="modal-date" id="modalDate"></span>
                </div>
                <div class="modal-actions">
                    <button class="action-btn" onclick="copyContent()">📋 复制</button>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 文档列表数据
        const docFiles = [
            { name: 'README.md', title: '📖 README.md', meta: '项目说明 | 架构 | API 概览', desc: '项目概述、功能特性、编译说明、使用示例', size: '9KB' },
            { name: 'APK', title: '📥 Android App', meta: '安卓 App | 3.1MB', desc: '点击下载 Android 客户端，安装后可直接浏览本文档中心', size: '3.1MB', isAPK: true },
            { name: 'PLAN.md', title: '📅 PLAN.md', meta: '策划文档 | 项目计划', desc: '项目背景、技术方案、开发阶段、风险分析', size: '8KB' },
            { name: 'PRD.md', title: '📋 PRD.md', meta: '产品需求 | 功能规划', desc: '产品概述、功能需求、性能指标、竞品分析', size: '21KB' },
            { name: 'DESIGN.md', title: '🎨 DESIGN.md', meta: '技术设计 | 架构设计', desc: '系统架构、核心模块、数据流、接口设计、性能优化', size: '27KB' },
            { name: 'TEST_CASE.md', title: '🧪 TEST_CASE.md', meta: '测试用例 | 质量保证', desc: '单元测试、集成测试、性能测试、压力测试、兼容性测试', size: '28KB' },
            { name: 'API.md', title: '📡 API.md', meta: 'SDK API | 接口文档', desc: 'ScreenshareSDK、Sender、Receiver、Config、错误码', size: '10KB' },
            { name: 'DEVELOPER.md', title: '🔧 DEVELOPER.md', meta: '开发维护 | 内部文档', desc: 'Git 工作流、组件说明、测试策略、已知问题', size: '9KB' },
            { name: 'PROJECT_REPORT.md', title: '📊 PROJECT_REPORT.md', meta: '进度报告 | 用户汇报', desc: '项目状态、代码统计、技术指标、下一步', size: '3KB' },
            { name: 'BUILD.md', title: '🏗️ BUILD.md', meta: '构建说明 | 编译指南', desc: '环境要求、编译步骤、构建配置', size: '2KB' }
        ];

        // 渲染文档列表
        const icons = ['📖', '📥', '📅', '📋', '🎨', '🧪', '📡', '🔧', '📊', '🏗️'];
        const docListEl = document.getElementById('docList');
        docListEl.innerHTML = docFiles.map((doc, i) => `
            <div class="doc-card" onclick="${doc.isAPK ? 'downloadAPK()' : "openDoc('" + doc.name + "')"}">
                <h3>${icons[i]} ${doc.title.replace(/^.{2}/, '')}</h3>
                <div class="doc-meta">${doc.meta}</div>
                <div class="doc-desc">${doc.desc}</div>
                <div class="doc-size">📄 ${doc.size}</div>
            </div>
        `).join('');

        // 下载 APK
        function downloadAPK() {
            const apkUrl = 'http://43.134.30.100:8080/downloads/tech-blog-app.apk';
            window.location.href = apkUrl;
        }

        // 打开文档
        async function openDoc(filename) {
            const modal = document.getElementById('docModal');
            const titleEl = document.getElementById('modalTitle');
            const dateEl = document.getElementById('modalDate');
            const bodyEl = document.getElementById('modalBody');

            titleEl.textContent = filename;
            bodyEl.innerHTML = '<p style="color: var(--text-secondary);">⏳ 加载中...</p>';
            modal.classList.add('show');

            try {
                const response = await fetch('./' + filename);
                if (!response.ok) throw new Error('加载失败');
                const content = await response.text();
                const doc = docFiles.find(d => d.name === filename);
                titleEl.textContent = doc ? doc.title : filename;
                dateEl.textContent = doc ? doc.meta : '';
                bodyEl.innerHTML = marked.parse(content);
            } catch (err) {
                bodyEl.innerHTML = `<p style="color: #e94560;">❌ ${err.message}</p>`;
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('docModal').classList.remove('show');
        }

        // 复制内容
        function copyContent() {
            const text = document.getElementById('modalBody').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }

        // ESC 关闭
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        // 点击遮罩关闭
        document.getElementById('docModal').addEventListener('click', e => {
            if (e.target.id === 'docModal') closeModal();
        });
    </script>
</body>
</html>
