<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小 - 文档中心</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="mobile-header">
        <div class="logo">📂 小 · 文档中心</div>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </header>
    
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 更新提示条 -->
    <div class="update-toast" id="updateToast">
        <span>🆕 发现新版本</span>
        <button onclick="refreshPage()">立即刷新</button>
        <button onclick="dismissUpdate()">稍后</button>
    </div>
    
    <div class="mobile-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📁 文档分类</h3>
                <button class="close-btn" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="category-list">
                <li class="category-item active" data-category="all" onclick="showCategory('all')">
                    <span class="cat-icon">📋</span>
                    <span>全部文档</span>
                    <span class="cat-count" id="count-all">-</span>
                </li>
                <li class="category-item" data-category="core" onclick="showCategory('core')">
                    <span class="cat-icon">⚙️</span>
                    <span>核心配置</span>
                    <span class="cat-count" id="count-core">-</span>
                </li>
                <li class="category-item" data-category="memory" onclick="showCategory('memory')">
                    <span class="cat-icon">🧠</span>
                    <span>记忆档案</span>
                    <span class="cat-count" id="count-memory">-</span>
                </li>
                <li class="category-item" data-category="project" onclick="showCategory('project')">
                    <span class="cat-icon">📱</span>
                    <span>项目文档</span>
                    <span class="cat-count" id="count-project">-</span>
                </li>
            </ul>
            <div class="sidebar-divider"></div>
            <div class="sidebar-footer">
                <p>🕐 最后更新</p>
                <p class="update-time" id="lastUpdate">-</p>
            </div>
        </aside>
        
        <main class="content">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文档..." oninput="handleSearch(this.value)">
            </div>
            
            <div class="doc-list-header">
                <h2 id="currentCategory">📋 全部文档</h2>
                <span class="doc-count" id="docCount">0 个文档</span>
            </div>

            <div class="quick-filter">
                <span class="filter-label">快速:</span>
                <button class="filter-btn active" data-cat="all" onclick="showCategory('all')">全部</button>
                <button class="filter-btn" data-cat="core" onclick="showCategory('core')">核心</button>
                <button class="filter-btn" data-cat="memory" onclick="showCategory('memory')">记忆</button>
                <button class="filter-btn" data-cat="project" onclick="showCategory('project')">项目</button>
            </div>
            
            <div id="docList" class="doc-list">
            </div>
        </main>
    </div>
    
    <div class="modal" id="docModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <h2 id="modalTitle">文档标题</h2>
                    <span class="modal-date" id="modalDate"></span>
                </div>
                <div class="modal-actions">
                    <button class="action-btn" onclick="copyContent()">📋 复制</button>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
    <script>
        // 更新时间
        const now = new Date();
        document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN', {
            month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });

        // 服务版本号（每次发布后自动更新）
        const SITE_VERSION = Date.now();

        // 搜索处理
        function handleSearch(query) {
            const q = query.toLowerCase().trim();
            const cards = document.querySelectorAll('.doc-card');
            let count = 0;
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(q) ? '' : 'none';
                if (text.includes(q)) count++;
            });
            document.getElementById('docCount').textContent = `${count} 个文档`;
        }

        // 自动更新检测
        let updateShown = false;

        function checkForUpdates() {
            if (updateShown) return;
            
            // 检测版本文件变化
            fetch('./version.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    const lastVersion = localStorage.getItem('siteVersion');
                    if (lastVersion && lastVersion != data.version) {
                        showUpdateToast();
                    }
                    localStorage.setItem('siteVersion', data.version);
                })
                .catch(() => {});
        }

        function showUpdateToast() {
            updateShown = true;
            document.getElementById('updateToast').classList.add('show');
        }

        function refreshPage() {
            localStorage.setItem('siteVersion', 'refresh');
            window.location.reload(true);
        }

        function dismissUpdate() {
            document.getElementById('updateToast').classList.remove('show');
        }

        // 页面可见性变化时检测更新（切回来时自动刷新）
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                checkForUpdates();
            }
        });

        // 每30秒检查一次
        setInterval(checkForUpdates, 30000);

        // 首次加载检查
        setTimeout(checkForUpdates, 2000);
    </script>
</body>
</html>
