<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小 - 文档中心</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== 增强样式 ===== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-card-hover: #222230;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #ff6b35;
            --accent-hover: #ff8555;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --gradient-1: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            --gradient-2: linear-gradient(135deg, #1a1a25 0%, #252535 100%);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景纹理 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(100, 100, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 头部 */
        .mobile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1.25rem;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -85%;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: var(--bg-secondary);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 80px 1.5rem 2rem;
            overflow-y: auto;
        }

        .sidebar.open { left: 0; }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .close-btn {
            background: var(--bg-card);
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover { color: var(--text-primary); }

        /* 分类列表 */
        .category-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .category-item {
            padding: 0.875rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .category-item:hover {
            background: var(--bg-card);
        }

        .category-item.active {
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }

        /* 主体区域 */
        .mobile-container {
            position: relative;
            z-index: 1;
            padding-top: 80px;
            padding-bottom: 2rem;
        }

        .content {
            padding: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 搜索框 */
        .search-box {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1.25rem;
            padding-left: 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box input::placeholder { color: var(--text-secondary); }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
        }

        /* 标题栏 */
        .doc-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .doc-list-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .doc-count {
            font-size: 0.875rem;
            color: var(--text-secondary);
            background: var(--bg-card);
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
        }

        /* 文档网格 */
        .doc-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .doc-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .doc-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 107, 53, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .doc-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .doc-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .doc-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.625rem;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .doc-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .doc-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .doc-preview {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
        }

        .doc-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .doc-tag {
            font-size: 0.7rem;
            padding: 0.25rem 0.625rem;
            border-radius: 8px;
            background: var(--accent-glow);
            color: var(--accent);
        }

        /* 项目卡片特殊样式 */
        .doc-card.project-card {
            background: var(--gradient-2);
        }

        .doc-card.project-card:hover {
            border-color: var(--accent);
        }

        /* 模态框 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--bg-card-hover);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .modal-close:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .modal-body pre {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.25rem;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .modal-body code {
            background: var(--bg-card);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .modal-body h1, .modal-body h2, .modal-body h3 {
            margin: 1.5rem 0 0.75rem;
        }

        .modal-body h1 { font-size: 1.75rem; }
        .modal-body h2 { font-size: 1.5rem; color: var(--accent); }
        .modal-body h3 { font-size: 1.25rem; }

        .modal-body p { margin: 0.75rem 0; line-height: 1.7; }

        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .modal-body th, .modal-body td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: left;
        }

        .modal-body th {
            background: var(--bg-card);
            font-weight: 600;
        }

        /* 链接样式 */
        a { 
            color: var(--accent);
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }

        /* 响应式 */
        @media (max-width: 768px) {
            .content { padding: 1rem; }
            .doc-list { grid-template-columns: 1fr; }
            .modal-content { max-height: 90vh; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <header class="mobile-header">
        <div class="logo">📂 小 · 文档中心</div>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </header>
    
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <div class="mobile-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📁 文档分类</h3>
                <button class="close-btn" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="category-list">
                <li class="category-item active" data-category="all" onclick="showCategory('all')">📋 全部文档</li>
                <li class="category-item" data-category="core" onclick="showCategory('core')">⚙️ 核心配置</li>
                <li class="category-item" data-category="memory" onclick="showCategory('memory')">🧠 记忆档案</li>
                <li class="category-item" data-category="project" onclick="showCategory('project')">📱 项目文档</li>
            </ul>
            <div class="sidebar-divider"></div>
            <ul class="recent-list">
                <li class="sidebar-title">🕐 最近访问</li>
            </ul>
        </aside>
        
        <main class="content">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文档..." oninput="filterDocs()">
            </div>
            
            <div class="doc-list-header">
                <h2 id="currentCategory">📋 全部文档</h2>
                <span class="doc-count" id="docCount">0 个文档</span>
            </div>
            
            <div id="docList" class="doc-list">
                <!-- 动态生成 -->
            </div>
        </main>
    </div>
    
    <div class="modal" id="docModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">文档标题</h2>
                <div class="modal-actions">
                    <button class="action-btn" onclick="copyContent()">📋 复制</button>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 文档内容 -->
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
    <script>
        // 侧边栏切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        // 分类切换
        function showCategory(cat) {
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-category="${cat}"]`).classList.add('active');
            filterDocs();
        }

        // 搜索过滤
        function filterDocs() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.querySelector('.category-item.active')?.dataset.category || 'all';
            const cards = document.querySelectorAll('.doc-card');
            let count = 0;
            cards.forEach(card => {
                const matchCat = cat === 'all' || card.dataset.category === cat;
                const matchQ = card.textContent.toLowerCase().includes(q);
                card.style.display = matchCat && matchQ ? '' : 'none';
                if (matchCat && matchQ) count++;
            });
            document.getElementById('docCount').textContent = `${count} 个文档`;
        }
    </script>
</body>
</html>
